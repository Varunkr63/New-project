services:
  - type: web
    name: voice-journal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_PATH
        value: /var/data/journal.db
      - key: AUDIO_DIR
        value: /var/data/audio
